<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Idea - InformateU</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary-color: #4F46E5;
      --primary-hover: #4338CA;
      --bg-color: #EEF2FF;
      --text-main: #111827;
      --text-muted: #6B7280;
      --border-color: #E5E7EB;
      --card-bg: #FFFFFF;
      --bg-input: #F9FAFB;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background-color: var(--card-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .brand-header {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background-color: var(--primary-color);
      border-radius: 8px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-right: 12px;
      color: white;
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: 8px;
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s;
    }

    .nav-item:hover,
    .nav-item.active {
      background-color: var(--bg-color);
      color: var(--primary-color);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      margin-right: 12px;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--primary-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* Form Styles */
    .form-section {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      max-width: 800px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .form-header {
      margin-bottom: 30px;
    }

    .form-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .form-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: var(--bg-input);
      font-size: 1rem;
      color: var(--text-main);
      transition: all 0.2s ease;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      background-color: #FFFFFF;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 180px;
    }

    .form-actions {
      display: flex;
      align-items: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .btn-submit {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      display: inline-flex;
      align-items: center;
    }

    .btn-submit svg {
      width: 18px;
      height: 18px;
      margin-right: 8px;
    }

    .btn-submit:hover {
      background-color: var(--primary-hover);
    }

    .btn-cancel {
      background-color: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      padding: 13px 28px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .btn-cancel:hover {
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding: 16px;
      }

      .nav-menu {
        flex-direction: row;
        overflow-x: auto;
      }

      .nav-item {
        white-space: nowrap;
      }

      .main-content {
        padding: 20px;
      }

      .form-section {
        padding: 24px;
      }

      .form-actions {
        flex-direction: column;
      }

      .btn-submit,
      .btn-cancel {
        width: 100%;
        justify-content: center;
        margin: 0 0 12px 0;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand-header">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" />
          <path d="M2 12L12 17L22 12" />
          <path d="M2 17L12 22L22 17" />
        </svg>
      </div>
      <div class="brand-name">InformateU</div>
    </div>

    <div class="nav-menu">
      <a href="home.html" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
          </path>
        </svg>
        Home
      </a>
      <a href="#" class="nav-item active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Share Idea
      </a>
      <a href="#" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
          </path>
        </svg>
        My Ideas
      </a>
      <a href="informateu.html" class="nav-item" style="margin-top: auto;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Log Out
      </a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="header">
      <h1>Share an Idea</h1>
      <div class="user-profile">
        <div class="avatar">U</div>
        <span></span>
      </div>
    </div>

    <div class="form-section">
      <div class="form-header">
        <h2>Contribute to the Community</h2>
        <p>Your knowledge is a valuable resource. Fill out the form below to share an idea, thought, or educational
          snippet with others.</p>
      </div>


      <form action="Addinfo" method="POST">
        <div class="form-group">
          <label for="info_domain">Info Domain (Category)</label>
          <select id="info_domain" name="info_domain" required>
            <option value="" disabled selected>Select a category...</option>
            <option value="Technology & Programming">Technology & Programming</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Science & Engineering">Science & Engineering</option>
            <option value="Design & UI/UX">Design & UI/UX</option>
            <option value="Productivity & Lifestyle">Productivity & Lifestyle</option>
            <option value="Business & Finance">Business & Finance</option>
            <option value="Other">Other / Miscellaneous</option>
          </select>
        </div>

        <div class="form-group">
          <label for="info">Your Idea / Information</label>
          <textarea id="info" name="info"
            placeholder="Write your insight, thought, or lesson here. Be as detailed as you'd like!"
            required></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
            Publish Idea
          </button>
          <a href="home.html" class="btn-cancel">Cancel</a>
        </div>
      </form>
    </div>

  </div>

</body>

</html>
